<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin - 净土法音</title>
<link rel="icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="admin-app">
  <!-- Login overlay -->
  <div id="loginOverlay" class="adm-login-overlay">
    <div class="adm-login-card">
      <img src="/icons/logo.png" alt="" style="width:48px;height:auto;opacity:.6">
      <h1 class="adm-login-title">净土法音 管理后台</h1>
      <input type="password" id="loginToken" class="adm-input" placeholder="管理密钥">
      <button id="loginBtn" class="adm-btn adm-btn-primary" style="width:100%">登录</button>
      <div id="loginError" class="adm-login-error"></div>
    </div>
  </div>

  <!-- Main layout (hidden until authenticated) -->
  <div id="adminMain" class="adm-layout" style="display:none">
    <aside class="adm-sidebar" id="sidebar">
      <div class="adm-sidebar-logo">
        <img src="/icons/logo.png" alt="" style="height:20px;width:auto">
        <span>管理后台</span>
      </div>
      <nav class="adm-nav" id="sidebarNav"></nav>
      <div class="adm-sidebar-footer">
        <button id="logoutBtn" class="adm-btn-text">退出登录</button>
      </div>
    </aside>
    <main class="adm-content" id="adminContent"></main>
  </div>
</div>

<script type="module" src="/src/admin/main.js"></script>
</body>
</html>
