<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="法音AI">
    <meta name="theme-color" content="#F9F8F6">
    <meta name="description" content="法音AI - 基于大安法师讲记，AI 解答净土法门疑问，引经据典，标注出处。">
    <link rel="canonical" href="https://foyue.org/ai">
    <!-- Open Graph (微信分享) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="法音AI · 讲记问答">
    <meta property="og:description" content="基于大安法师讲经内容，AI 解答净土法门疑问。引经据典，标注出处。">
    <meta property="og:url" content="https://foyue.org/ai">
    <meta property="og:site_name" content="净土法音">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:image" content="https://foyue.org/icons/icon-512.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="法音AI · 讲记问答">
    <meta name="twitter:description" content="基于大安法师讲经内容，AI 解答净土法门疑问。">
    <meta name="twitter:image" content="https://foyue.org/icons/icon-512.png">
    <title>法音AI · 讲记问答</title>
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192">
    <link rel="shortcut icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "法音AI",
  "alternateName": "Pure Land Dharma AI",
  "url": "https://foyue.org/ai",
  "description": "基于大安法师讲经内容，AI 解答净土法门疑问，引经据典，标注出处。",
  "applicationCategory": "EducationalApplication",
  "operatingSystem": "All",
  "inLanguage": "zh-CN",
  "isPartOf": {
    "@type": "WebSite",
    "name": "净土法音",
    "url": "https://foyue.org"
  },
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "CNY"
  }
}
</script>
</head>

<body>
    <div id="ai-app">
        <!-- 顶栏 -->
        <header class="ai-header">
            <div class="ai-header-inner">
                <a href="/" class="ai-header-back" aria-label="返回首页" title="返回首页">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15,18 9,12 15,6" />
                    </svg>
                </a>
                <div class="ai-header-title-group" aria-label="法音AI">
                    <span class="ai-header-brand">法音AI</span>
                </div>
                <button class="ai-header-btn" id="btnConvList" type="button" aria-label="对话记录" title="对话记录">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="15" y2="12" />
                        <line x1="3" y1="18" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- 对话列表侧边栏 -->
        <div class="ai-conv-backdrop" id="convBackdrop"></div>
        <aside class="ai-conv-drawer" id="convDrawer">
            <!-- 底部弹窗拖拽把手 -->
            <div class="ai-conv-sheet-handle" aria-hidden="true"></div>
            <div class="ai-conv-drawer-head">
                <h2>对话记录</h2>
                <button class="ai-conv-new" id="btnNewConv" aria-label="新建对话">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span>新对话</span>
                </button>
            </div>
            <div class="ai-conv-search-wrap">
                <input type="search" id="convSearchInput" class="ai-conv-search" placeholder="搜索对话..."
                    autocomplete="off">
            </div>
            <ul class="ai-conv-list" id="convList"></ul>
            <div class="ai-conv-drawer-foot">
                <button class="ai-conv-clear" id="btnClear" aria-label="清空当前对话">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                    </svg>
                    清空当前对话
                </button>
                <button class="ai-conv-export" id="btnExportConv" aria-label="导出对话">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    导出当前对话
                </button>
            </div>
        </aside>

        <!-- 对话列表抽屉 -->

        <!-- 对话区域 -->
        <main class="ai-chat-area" id="chatArea" role="log" aria-live="polite" aria-label="对话消息">
            <!-- 欢迎内容由 JS 渲染 -->
        </main>

        <!-- 输入区域 -->
        <footer class="ai-input-area">
            <div class="ai-input-shell">
                <div class="ai-input-wrap">
                    <textarea class="ai-input" id="chatInput" placeholder="请输入你的疑问" maxlength="500" autocomplete="off"
                        rows="1" aria-label="输入问题"></textarea>
                    <button class="ai-send-btn" id="btnSend" type="button" aria-label="发送" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path d="M12 19V5M5 12l7-7 7 7" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
                <div class="ai-input-meta">
                    <span class="ai-char-count" id="charCount"></span>
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="/src/js/ai-app.js"></script>
    <div class="ai-toast" id="aiToast" role="status" aria-live="polite"></div>
</body>

</html>
