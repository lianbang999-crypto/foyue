    <meta property="og:description" content="基于大安法师讲经内容，AI智能解答净土法门疑问。引经据典，标注出处。">
    <meta property="og:url" content="https://foyue.org/ai">
    <meta property="og:site_name" content="净土法音">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:image" content="https://foyue.org/icons/icon-512.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="法音AI · 净土智慧问答">
    <meta name="twitter:description" content="基于大安法师讲经内容，AI智能解答净土法门疑问。">
    <meta name="twitter:image" content="https://foyue.org/icons/icon-512.png">
    <title>法音AI · 净土智慧问答</title>
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192">
    <link rel="shortcut icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "法音AI",
  "alternateName": "Pure Land Dharma AI",
  "url": "https://foyue.org/ai",
  "description": "基于大安法师讲经内容的净土宗智能问答，引经据典，标注出处。",
  "applicationCategory": "EducationalApplication",
  "operatingSystem": "All",
  "inLanguage": "zh-CN",
  "isPartOf": {
    "@type": "WebSite",
    "name": "净土法音",
    "url": "https://foyue.org"
  },
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "CNY"
  }
}
</script>
</head>

<body>
    <div id="ai-app">
        <!-- 顶栏 -->
        <header class="ai-header">
            <div class="ai-header-inner">
                <a href="/" class="ai-header-brand" aria-label="返回净土法音">
                    <svg class="ai-brand-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.85;">
    <circle cx="12" cy="12" r="9" stroke-dasharray="2 4"/>
    <path d="M12 21C12 21 7 16 7 12C7 8 12 4 12 4C12 4 17 8 17 12C17 16 12 21 12 21Z"/>
</svg>
                    <span>法音AI</span>
                </a>
                <div class="ai-header-actions">
                    <button class="ai-header-btn" id="btnShare" aria-label="分享" title="分享">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7" />
                            <polyline points="16 6 12 2 8 6" />
                            <line x1="12" y1="2" x2="12" y2="15" />
                        </svg>
                    </button>
                    <button class="ai-header-btn" id="btnClear" aria-label="清空对话" title="清空对话">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                        </svg>
                    </button>
                    <a href="/wenku" class="ai-header-link">文库</a>
                </div>
            </div>
        </header>

        <!-- 对话区域 -->
        <main class="ai-chat-area" id="chatArea" role="log" aria-live="polite" aria-label="对话消息">
            <!-- 欢迎内容由 JS 渲染 -->
        </main>

        <!-- 输入区域 -->
        <footer class="ai-input-area">
            <div class="ai-input-wrap">
                <textarea class="ai-input" id="chatInput" placeholder="问关于净土法门的问题…" maxlength="500" autocomplete="off"
                    rows="1" aria-label="输入问题"></textarea>
                <button class="ai-send-btn" id="btnSend" aria-label="发送" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M5 12h14M12 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <p class="ai-disclaimer-footer">AI 回答仅供参考，请以法师原始开示为准</p>
        </footer>
    </div>

    <script type="module" src="/src/js/ai-app.js"></script>
</body>

</html>
