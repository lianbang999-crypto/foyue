<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>净土法音 - 纯语音念佛计数测试</title>
    <style>
        :root {
            --bg-base: #111111;
            --text-color: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent: #E5C385;
            /* 金色 */
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-base);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* 核心波纹效果区 */
        .wave-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            pointer-events: none;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wave-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(229, 195, 133, 0.2);
            transition: transform 0.1s linear, border-color 0.1s linear;
        }

        /* 计数文本区 */
        .count-display {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 20px rgba(229, 195, 133, 0.4);
            font-variant-numeric: tabular-nums;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 10px;
            z-index: 2;
            position: relative;
            letter-spacing: 2px;
        }

        /* 识别结果回显区 */
        .transcript-box {
            position: absolute;
            top: 20%;
            width: 80%;
            text-align: center;
            min-height: 40px;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            transition: all 0.3s;
        }

        .highlight {
            color: var(--accent);
        }

        /* 按钮与状态 */
        .btn-toggle {
            position: absolute;
            bottom: 12%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px 40px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-toggle.active {
            background: rgba(229, 195, 133, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px rgba(229, 195, 133, 0.2);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 0 0 rgba(229, 195, 133, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(229, 195, 133, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(229, 195, 133, 0);
            }
        }

        .debug-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 10px;
            color: #555;
            text-align: left;
            pointer-events: none;
            z-index: 20;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <div class="debug-panel" id="debug"></div>

    <div class="wave-container" id="waveContainer"></div>

    <div class="transcript-box" id="transcript">等待开启...</div>

    <div class="container">
        <h1 class="count-display" id="countDisplay">0</h1>
        <div class="subtitle">无触控·语音阵列模式</div>
    </div>


    <button class="btn-toggle" id="btnToggle">开启伴修</button>

    <script>
        const btnToggle = document.getElementById('btnToggle');
        const countDisplay = document.getElementById('countDisplay');
        const transcriptBox = document.getElementById('transcript');
        const waveContainer = document.getElementById('waveContainer');
        const debug = document.getElementById('debug');

        let isListening = false;
        let count = 0;
        let stream = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let recognition = null;
        let logText = '';
        let animationFrameId = null;

        // 生成波纹环
        const numCircles = 4;
        const circles = [];
        for (let i = 0; i < numCircles; i++) {
            const c = document.createElement('div');
            c.className = 'wave-circle';
            const size = 120 + i * 40;
            c.style.width = size + 'px';
            c.style.height = size + 'px';
            waveContainer.appendChild(c);
            circles.push(c);
        }

        function log(msg) {
            console.log(msg);
            logText = msg + '\n' + logText;
            if (logText.length > 200) logText = logText.substring(0, 200);
            debug.innerText = logText;
        }

        // Web Audio 可视化
        async function startAudioWave() {
            try {
                if (!stream) {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                }
                const Ac = window.AudioContext || window.webkitAudioContext;
                if (!audioContext) audioContext = new Ac();
                if (audioContext.state === 'suspended') audioContext.resume();

                if (!analyser) {
                    const source = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
                renderWave();
            } catch (e) {
                log('麦克风读取被拒绝: ' + e.message);
                transcriptBox.innerHTML = '需要麦克风权限来生成视觉波纹';
            }
        }

        function renderWave() {
            if (!isListening || !analyser) return;
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / dataArray.length; // 0-255

            const opacity = Math.min(1, avg / 80);

            circles.forEach((c, index) => {
                const factor = 1 + (avg / (100 + index * 80));
                c.style.transform = `scale(${factor})`;
                c.style.borderColor = `rgba(229, 195, 133, ${Math.max(0, opacity - index * 0.15)})`;
            });

            animationFrameId = requestAnimationFrame(renderWave);
        }

        // 语音识别逻辑 (Web Speech API)
        function setupSpeech() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) {
                transcriptBox.innerHTML = '您的浏览器不支持原生语音识别。请使用最新版 Chrome、Safari 或 Edge。';
                return;
            }

            recognition = new SpeechRec();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';

            recognition.onstart = () => {
                log('语音识别监听开始');
                transcriptBox.innerHTML = '正在聆听...(请尝试念诵包含「佛」的句子)';
            };

            recognition.onresult = (evt) => {
                let interim = '';
                let finalStr = '';

                for (let i = evt.resultIndex; i < evt.results.length; i++) {
                    const res = evt.results[i][0].transcript;
                    if (evt.results[i].isFinal) {
                        finalStr += res;
                        checkKeywords(res);
                    } else {
                        interim += res;
                    }
                }

                if (finalStr) {
                    transcriptBox.innerHTML = `<span class="highlight">「 ${finalStr.trim()} 」</span>`;
                } else if (interim) {
                    transcriptBox.innerHTML = `实时识别: ${interim}`;
                }
            };

            recognition.onerror = (e) => {
                log('语音识别错误: ' + e.error);
                if (e.error === 'not-allowed') stopAll();
            };

            recognition.onend = () => {
                log('语音流中断，检测是否需要重启...');
                if (isListening) {
                    try { recognition.start(); } catch (err) { }
                }
            };
        }

        // 关键词匹配计数
        function checkKeywords(text) {
            if (!text) return;
            // 简单的正则，计算含有多少个佛号分词
            let matches = text.match(/弥陀佛|阿弥|南无|陀佛|佛/g);
            if (matches) {
                count += matches.length;
                countDisplay.innerText = count;

                // 击中特效
                countDisplay.style.transform = 'scale(1.2)';
                countDisplay.style.color = '#fff';
                setTimeout(() => {
                    countDisplay.style.transform = 'none';
                    countDisplay.style.color = 'var(--text-color)';
                }, 150);

                if (navigator.vibrate) {
                    try { navigator.vibrate([15]); } catch (e) { }
                }
            }
        }

        function toggle() {
            if (isListening) {
                stopAll();
            } else {
                startAll();
            }
        }

        async function startAll() {
            isListening = true;
            btnToggle.innerText = '暂停伴修';
            btnToggle.classList.add('active');

            try {
                if (navigator.wakeLock) await navigator.wakeLock.request('screen');
            } catch (e) { log('WakeLock 失败或不支持') }

            // 启动音频分析
            await startAudioWave();

            // 启动语音识别
            if (!recognition) setupSpeech();
            if (recognition) {
                try { recognition.start(); } catch (e) { log('识别启动错误'); }
            }
        }

        function stopAll() {
            isListening = false;
            btnToggle.innerText = '开启伴修';
            btnToggle.classList.remove('active');
            transcriptBox.innerHTML = '已暂停';

            circles.forEach(c => {
                c.style.transform = 'none';
                c.style.borderColor = 'rgba(229, 195, 133, 0.2)';
            });
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (recognition) {
                try { recognition.stop(); } catch (e) { }
            }
        }

        btnToggle.addEventListener('click', toggle);
    </script>
</body>

</html>
