      <path d="M24 61 C86 55, 178 57, 238 61" class="ink-soft"/>
      <text x="24" y="91" class="small">简短归纳</text>
      <text x="24" y="118" class="small">回答以原文引用为中心，避免替代开示。</text>
      <path d="M24 142 C108 136, 319 138, 407 145" class="ink-thin"/>
      <text x="24" y="171" class="tiny">出处：净土百问 · 第十二讲</text>
    </g>

    <g transform="translate(34 432)">
      <text x="0" y="0" class="label">原文预览</text>
