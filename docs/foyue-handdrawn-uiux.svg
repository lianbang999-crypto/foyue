      <text x="103" y="39" class="tiny">听经</text>
      <circle cx="220" cy="33" r="25" fill="#d97757"/>
      <path d="M212 21 L212 45 L232 33 Z" fill="#fffdf7"/>
      <text x="293" y="39" class="tiny">文库</text>
      <text x="366" y="39" class="tiny">我的</text>
    </g>

    <text x="86" y="852" class="label">03 AI / 文库：引用、预览、回到原文</text>
  </g>
</svg>
