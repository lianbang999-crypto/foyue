      <text x="89" y="62" class="ui-bold">佛说阿弥陀经讲记</text>
      <text x="89" y="88" class="tiny">命中片段 · 关键词高亮</text>
      <text x="89" y="120" class="small">「当下这一念，安住佛号……」</text>
      <path d="M89 145 C154 139, 240 140, 302 145" class="accent-line"/>
      <text x="89" y="174" class="tiny" fill="#d97757">去文库阅读全文</text>
