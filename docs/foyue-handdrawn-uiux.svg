    <g transform="translate(34 693)">
      <path d="M7 4 C113 -3, 321 0, 420 8 C438 10, 449 22, 444 38 C435 67, 29 70, 8 58 C-6 50,-5 14,7 4 Z" fill="#fffdf7" stroke="#3a2c23" stroke-width="1.4"/>
