name: Deploy Workers

# 当 main 分支的 workers/ 目录有变更时自动部署
on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy audio + brain workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        working-directory: workers
        run: |
          npm install -g wrangler@latest
          wrangler --version

      - name: Deploy Audio Worker
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Deploying audio-subdomain-worker..."
          wrangler deploy --config wrangler.toml

      - name: Deploy Brain Cron Worker
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Deploying foyue-brain-worker (Cron + AI 自学习)..."
          wrangler deploy --config brain-wrangler.toml
