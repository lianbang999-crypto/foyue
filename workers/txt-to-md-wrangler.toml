# txt-to-md 转换 Worker 配置
# 临时使用，转换完成后可删除

name = "txt-to-md-worker"
main = "txt-to-md-worker.js"
compatibility_date = "2025-01-01"

# R2 文库桶绑定
[[r2_buckets]]
binding = "R2_WENKU"
bucket_name = "jingdianwendang"

# AI Search 绑定
[[ai_search]]
binding = "DHARMA_SEARCH"
instance_name = "foyue-wenku"

# D1 数据库绑定（reindex 时查询 r2_key → id 映射）
[[d1_databases]]
binding = "DB"
database_name = "foyue-db"
database_id = "be0b21ab-4549-45bc-ac38-5f9e1864d061"
