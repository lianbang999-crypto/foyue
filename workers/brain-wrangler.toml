# AI Brain 自动学习 Worker 配置

name = "foyue-brain-worker"
main = "brain-cron-worker.js"
compatibility_date = "2025-01-01"

# Cron 触发器：每4小时自动学习
[triggers]
crons = ["0 3 * * *"]

# D1 数据库（和 Pages 共享同一个）
[[d1_databases]]
binding = "DB"
database_name = "foyue-db"
database_id = "be0b21ab-4549-45bc-ac38-5f9e1864d061"

# Workers AI
[ai]
binding = "AI"

# 环境变量（部署时通过 secret 设置 ADMIN_TOKEN 和 GOOGLE_AI_KEY）
[vars]
WORKER_ENV = "production"
ENABLE_AI_BRAIN_JOB = false
# 外部 LLM 配置（优先级最高，OpenAI 兼容格式）
# 设置方式：wrangler secret put EXTERNAL_LLM_KEY --config brain-wrangler.toml
# 默认使用智谱 GLM-4.7-Flash，也支持 DeepSeek 等
# EXTERNAL_LLM_BASE = "https://open.bigmodel.cn/api/paas/v4"  # 默认值
# EXTERNAL_LLM_MODEL = "glm-4.7-flash"                        # 默认值
#
# 备用：Groq（OpenAI 兼容，免费 LLaMA 3.3 70B）
# wrangler secret put GROQ_API_KEY --config brain-wrangler.toml
# GROQ_BASE = "https://api.groq.com/openai/v1"                # 默认值
# GROQ_MODEL = "llama-3.3-70b-versatile"                       # 默认值
#
# 备选：Google AI（如果以上均不可用）
# wrangler secret put GOOGLE_AI_KEY --config brain-wrangler.toml
GOOGLE_AI_MODEL = "gemini-2.5-flash-preview-04-17"
