# AI Brain 自动学习 Worker 配置

name = "foyue-brain-worker"
main = "brain-cron-worker.js"
compatibility_date = "2025-01-01"

# Cron 触发器：每天 UTC 20:00（北京时间凌晨 4:00）自动运行
[triggers]
crons = ["0 20 * * *"]

# D1 数据库（和 Pages 共享同一个）
[[d1_databases]]
binding = "DB"
database_name = "foyue-db"
database_id = "be0b21ab-4549-45bc-ac38-5f9e1864d061"

# Workers AI
[ai]
binding = "AI"

# 环境变量（部署时通过 secret 设置 ADMIN_TOKEN 和 GOOGLE_AI_KEY）
[vars]
WORKER_ENV = "production"
# 可选：Google AI 模型名称（设置 GOOGLE_AI_KEY secret 后生效）
# Cloudflare 上第一次启用 Gemma 接口只需执行：
#   wrangler secret put GOOGLE_AI_KEY --config brain-wrangler.toml
GOOGLE_AI_MODEL = "gemma-3-27b-it"
