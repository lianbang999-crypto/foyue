# 净土法音 Pages 配置
# 此文件让 Cloudflare Pages 绑定 D1 数据库
# Pages Functions (functions/ 目录) 会自动使用此配置

name = "amituofo"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# 后台重任务开关（默认关闭，需手动改回 true 并重新部署）
[vars]
ENABLE_AI_TRANSCRIPT_JOB = false
ENABLE_AI_BRAIN_JOB = false
ENABLE_AI_EMBEDDING_JOB = false

[[d1_databases]]
binding = "DB"
database_name = "foyue-db"
database_id = "be0b21ab-4549-45bc-ac38-5f9e1864d061"
migrations_dir = "workers/migrations"

# Workers AI 绑定
[ai]
binding = "AI"

# Vectorize 向量数据库绑定
[[vectorize]]
binding = "VECTORIZE"
index_name = "dharma-content"

# R2 存储桶绑定 — 文库文档来源
[[r2_buckets]]
binding = "R2_WENKU"
bucket_name = "jingdianwendang"

# AI Search 绑定 — 替代 Vectorize 自定义 RAG
[[ai_search]]
binding = "DHARMA_SEARCH"
instance_name = "foyue-wenku"
