# 净土法音 Pages 配置
# 此文件让 Cloudflare Pages 绑定 D1 数据库
# Pages Functions (functions/ 目录) 会自动使用此配置

name = "amituofo"
account_id = "26421038b798983a846d930404453652"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_name = "foyue-db"
database_id = "be0b21ab-4549-45bc-ac38-5f9e1864d061"
migrations_dir = "workers/migrations"

# Workers AI 绑定
[ai]
binding = "AI"

# Vectorize 向量数据库绑定
[[vectorize]]
binding = "VECTORIZE"
index_name = "dharma-content"

# R2 存储桶绑定 — 文库文档来源
[[r2_buckets]]
binding = "R2_WENKU"
bucket_name = "jingdianwendang"
